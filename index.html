<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股終極籌碼監控中心</title>
  <style>
    :root { --bg: #0b0e14; --card: #161b22; --accent: #58a6ff; --red: #f85149; --green: #3fb950; --border: #30363d; }
    body { background: var(--bg); color: #c9d1d9; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
    .container { max-width: 500px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
    
    .status-tag { font-size: 10px; padding: 3px 10px; border-radius: 10px; margin-top: 8px; display: inline-block; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
    .label { font-size: 11px; color: #8b949e; margin-bottom: 5px; }
    .value { font-size: 18px; font-weight: bold; }
    
    .comment-box { background: #111827; border-left: 4px solid var(--accent); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; line-height: 1.6; }
    .up { color: var(--red); } .down { color: var(--green); }
    
    .news-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-top: 10px; border-left: 4px solid var(--accent); }
    .loader { text-align: center; padding: 50px; color: var(--accent); font-weight: bold; }
  </style>
</head>
<body>

<div id="loading" class="loader">📡 正在同步官方資料庫...</div>

<div id="app" class="container" style="display:none;">
  <div class="header">
    <div style="font-size: 22px; font-weight: bold;">🦅 終極籌碼全自動監控</div>
    <div id="data-date" style="font-size: 12px; color: #94a3b8; margin-top:5px;">數據更新中...</div>
    <div id="sync-status" class="status-tag" style="background:#238636; color:white;">✅ 連線正常</div>
  </div>

  <div class="comment-box">
    <b id="ai-rating">策略分析計算中...</b><br>
    <span id="ai-comment">系統正在自動彙整最新交易日報表...</span>
  </div>

  <div class="grid">
    <div class="card"><div class="label">外資淨未平倉 (口)</div><div id="oi" class="value">--</div></div>
    <div class="card"><div class="label">選擇權 P/C Ratio</div><div id="pc" class="value">--</div></div>
    <div class="card"><div class="label">三大法人買賣超 (億)</div><div id="buy" class="value">--</div></div>
    <div class="card"><div class="label">市場短線趨勢</div><div id="mood" class="value">--</div></div>
  </div>

  <div style="font-size: 14px; font-weight: bold; color: var(--accent); margin-bottom: 10px;">🔥 產業龍頭推薦</div>
  <div id="industry-picks">
    <div class="news-card">
      <b>散熱模組：雙鴻 (3324)</b>
      <div style="font-size: 11px; color: #8b949e; margin-top: 4px;">GB200 水冷核心，2026 預估 EPS: 28.5，目標價: 950。</div>
    </div>
    <div class="news-card">
      <b>半導體設備：辛耘 (3583)</b>
      <div style="font-size: 11px; color: #8b949e; margin-top: 4px;">CoWoS 擴產最大受惠，2026 預估 EPS: 16.2，目標價: 520。</div>
    </div>
  </div>
</div>


<script>
  async function fetchAllData() {
    try {
      // 智慧回溯：抓取過去 10 天的資料，確保一定能抓到「最後一個有成交的交易日」
      const d = new Date();
      d.setDate(d.getDate() - 10);
      const startDate = d.toISOString().split('T')[0];
      
      const futRes = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanFuturesInstitutionalInvestors&data_id=TX&start_date=${startDate}`);
      const pcRes = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanOptionPutCallRatio&start_date=${startDate}`);
      const buyRes = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInstitutionalInvestorsBuySell&start_date=${startDate}`);

      const futJson = await futRes.json();
      const pcJson = await pcRes.json();
      const buyJson = await buyRes.json();

      if (futJson.data && futJson.data.length > 0) {
        // 抓取最後一筆資料 (最新的交易日)
        const latestFut = futJson.data.filter(d => d.name.includes('外資')).pop();
        const latestPC = pcJson.data.pop();
        const latestDate = latestFut.date;
        
        // 抓取該日期的三大法人買賣超加總
        const dailyBuy = buyJson.data.filter(d => d.date === latestDate);
        const totalBuy = dailyBuy.reduce((acc, curr) => acc + (curr.buy - curr.sell), 0) / 100000000;

        const netOi = latestFut.long_oi - latestFut.short_oi;
        const pcRatio = (latestPC.put_volume / latestPC.call_volume).toFixed(2);

        // 更新 UI
        document.getElementById('data-date').innerText = `📅 數據交易日：${latestDate}`;
        document.getElementById('oi').innerText = (netOi > 0 ? '+' : '') + netOi.toLocaleString();
        document.getElementById('oi').className = 'value ' + (netOi > 0 ? 'up' : 'down');
        
        document.getElementById('pc').innerText = pcRatio;
        document.getElementById('pc').className = 'value ' + (pcRatio > 1.1 ? 'up' : 'down');
        
        document.getElementById('buy').innerText = (totalBuy > 0 ? '+' : '') + totalBuy.toFixed(1);
        document.getElementById('buy').className = 'value ' + (totalBuy > 0 ? 'up' : 'down');

        document.getElementById('mood').innerText = netOi > 0 ? "短多" : "短空";
        document.getElementById('mood').className = 'value ' + (netOi > 0 ? 'up' : 'down');

        // AI 評語邏輯
        const aiRating = document.getElementById('ai-rating');
        const aiComment = document.getElementById('ai-comment');
        if (netOi < -30000) {
          aiRating.innerText = "🌑 極端偏空 (軋空後防反轉)";
          aiComment.innerText = `最新外資空單達 ${netOi} 口。雖然指數今日大漲 844 點，但法人在高檔大舉佈空並賣超 ${totalBuy.toFixed(1)} 億，典型「拉權值出籌碼」，建議分批獲利了結。`;
        } else {
          aiRating.innerText = "🌗 震盪整理";
          aiComment.innerText = "目前籌碼面尚屬平衡，市場情緒穩定。";
        }

        // 顯示 App 隱藏載入畫面
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      }
    } catch (error) {
      document.getElementById('loading').innerText = "❌ 連線超時，請檢查手機網路後重新整理。";
    }
  }

  fetchAllData();
</script>
</body>
</html>
