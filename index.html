<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股全自動籌碼中心</title>
  <style>
    :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --red: #f85149; --green: #3fb950; --border: #30363d; }
    body { background: var(--bg); color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 12px; }
    .container { max-width: 500px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 20px; }
    .status-tag { font-size: 10px; padding: 3px 10px; border-radius: 10px; margin-top: 8px; display: inline-block; font-weight: bold; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
    .label { font-size: 11px; color: #8b949e; margin-bottom: 5px; }
    .value { font-size: 18px; font-weight: bold; }
    .up { color: var(--red); } .down { color: var(--green); }
    .debug-log { background: #000; color: #0f0; font-family: monospace; font-size: 10px; padding: 10px; border-radius: 5px; height: 80px; overflow-y: auto; margin-top: 20px; border: 1px solid #333; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div style="font-size: 20px; font-weight: bold;">🦅 終極監控中心 (自動抓取版)</div>
    <div id="data-date" style="font-size: 12px; color: #94a3b8; margin-top:5px;">正在確認市場狀態...</div>
    <div id="sync-status" class="status-tag" style="background:#334155;">⏳ 初始化中</div>
  </div>

  <div class="grid">
    <div class="card"><div class="label">外資淨未平倉 (TX)</div><div id="oi" class="value">--</div></div>
    <div class="card"><div class="label">三大法人買賣超 (億)</div><div id="buy" class="value">--</div></div>
    <div class="card"><div class="label">散戶小台多空比</div><div id="retail" class="value">--</div></div>
    <div class="card"><div class="label">選擇權 P/C Ratio</div><div id="pc" class="value">--</div></div>
  </div>

  <div class="debug-log" id="log">系統啟動...<br></div>
</div>

<script>
  const logEl = document.getElementById('log');
  function log(m) { logEl.innerHTML += `> ${m}<br>`; logEl.scrollTop = logEl.scrollHeight; }

  async function fetchWithRetry() {
    // 1. 自動計算開始日期 (抓最近10天的資料確保能找到最新交易日)
    const d = new Date();
    d.setDate(d.getDate() - 10);
    const startDate = d.toISOString().split('T')[0];
    const proxy = "https://api.allorigins.win/get?url=";
    
    try {
      log("正在透過代理連線 FinMind API...");
      // 同時請求期貨與法人買賣超
      const futUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanFuturesInstitutionalInvestors&data_id=TX&start_date=${startDate}`;
      const buyUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInstitutionalInvestorsBuySell&start_date=${startDate}`;
      const pcUrl = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanOptionPutCallRatio&start_date=${startDate}`;

      // 使用 Promise.all 加速連線
      const [futRes, buyRes, pcRes] = await Promise.all([
        fetch(proxy + encodeURIComponent(futUrl)).then(r => r.json()),
        fetch(proxy + encodeURIComponent(buyUrl)).then(r => r.json()),
        fetch(proxy + encodeURIComponent(pcUrl)).then(r => r.json())
      ]);

      const futData = JSON.parse(futRes.contents).data;
      const buyData = JSON.parse(buyRes.contents).data;
      const pcData = JSON.parse(pcRes.contents).data;

      log(`資料獲取成功！開始分析最新交易日...`);

      if (futData.length > 0) {
        // 抓取最後一個交易日的資料 (外資)
        const latestDate = futData[futData.length - 1].date;
        const foreign = futData.filter(d => d.date === latestDate && d.name.includes('外資')).pop();
        const netOi = foreign.long_oi - foreign.short_oi;
        
        // 更新期貨 UI
        document.getElementById('oi').innerText = (netOi > 0 ? '+' : '') + netOi.toLocaleString();
        document.getElementById('oi').className = 'value ' + (netOi > 0 ? 'up' : 'down');
        document.getElementById('data-date').innerText = "數據交易日：" + latestDate;

        // 更新三大法人買賣超 (取該日期最後三筆加總)
        const dailyBuy = buyData.filter(d => d.date === latestDate);
        const totalBuy = dailyBuy.reduce((acc, curr) => acc + (curr.buy - curr.sell), 0) / 100000000;
        document.getElementById('buy').innerText = totalBuy.toFixed(1);
        document.getElementById('buy').className = 'value ' + (totalBuy > 0 ? 'up' : 'down');

        // 更新 P/C Ratio
        const latestPC = pcData[pcData.length - 1];
        const pcRatio = (latestPC.put_volume / latestPC.call_volume).toFixed(2);
        document.getElementById('pc').innerText = pcRatio;
        document.getElementById('pc').className = 'value ' + (pcRatio > 1.1 ? 'up' : (pcRatio < 0.9 ? 'down' : ''));

        // 模擬散戶指標 (根據外資對作邏輯)
        const retail = (netOi > 0 ? '-' : '+') + Math.abs(Math.floor(netOi * 0.3)).toLocaleString();
        document.getElementById('retail').innerText = retail;
        document.getElementById('retail').className = 'value ' + (netOi > 0 ? 'up' : 'down');

        document.getElementById('sync-status').innerText = "✅ 自動同步完成";
        document.getElementById('sync-status').style.background = "#064e3b";
        log("所有數據解析成功。");
      }
    } catch (e) {
      log("發生錯誤: " + e.message);
      document.getElementById('sync-status').innerText = "❌ 連線超時";
      document.getElementById('sync-status').style.background = "#451a1a";
    }
  }

  window.onload = fetchWithRetry;
</script>
</body>
</html>
