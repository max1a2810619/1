<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡籌碼監控站</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212; /* 深色科技背景 */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .dashboard {
            width: 100%;
            max-width: 400px;
            background: #1e1e1e;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #333;
        }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
        .date-info { font-size: 12px; color: #888; margin-top: 8px; }
        
        .data-card {
            background: #252525;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .data-card:last-child { margin-bottom: 0; }
        .label {
            font-size: 14px;
            color: #aaaaaa;
            font-weight: 500;
        }
        .value {
            font-size: 24px;
            font-weight: bold;
            font-family: monospace; /* 讓數字對齊更漂亮 */
        }
        /* 顏色控制 */
        .red { color: #ff4d4f; }
        .green { color: #52c41a; }
        .gray { color: #888; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>📊 大盤主力籌碼</h1>
        <div class="date-info" id="time-display">資料載入中...</div>
    </div>

    <div class="data-card">
        <div class="label">三大法人買賣超</div>
        <div class="value" id="val-net-buy">--</div>
    </div>

    <div class="data-card">
        <div class="label">外資未平倉 (口)</div>
        <div class="value" id="val-oi-total">--</div>
    </div>

    <div class="data-card">
        <div class="label">外資未平倉增減</div>
        <div class="value" id="val-oi-change">--</div>
    </div>
</div>

<script src="data.js"></script>

<script>
    // 渲染資料到網頁上
    function renderData() {
        if (typeof marketData === 'undefined') {
            document.getElementById('time-display').innerText = '⚠️ 等待 GitHub Actions 首次更新資料...';
            return;
        }

        document.getElementById('time-display').innerText = 
            `交易日期: ${marketData.data_date} | 更新於: ${marketData.update_time}`;

        const elements = [
            { id: 'val-net-buy', data: marketData.net_buy },
            { id: 'val-oi-total', data: marketData.oi_total },
            { id: 'val-oi-change', data: marketData.oi_change }
        ];

        elements.forEach(item => {
            const el = document.getElementById(item.id);
            el.innerText = item.data.value;
            el.className = `value ${item.data.color}`; // 套用紅色或綠色
        });
    }

    renderData();
</script>

</body>
</html>
