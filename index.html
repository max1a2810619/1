<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台股今日強勢股分析</title>
  <style>
    body {
      background-color: #0f1115;
      color: #ffffff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    
    .app-container {
      max-width: 600px;
      margin: 0 auto; /* 讓網頁在電腦螢幕上也能置中好看 */
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      color: #aaaaaa;
      font-size: 20px;
      margin-bottom: 20px;
    }

    .scan-btn {
      width: 100%;
      padding: 16px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      cursor: pointer;
    }
    
    .scan-btn:active { background-color: #1d4ed8; }
    .scan-btn:disabled { background-color: #4b5563; cursor: not-allowed; }

    .dashboard {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .loading-text {
      text-align: center;
      color: #888888;
      margin-top: 30px;
      font-size: 14px;
      line-height: 1.5;
    }

    .card {
      background-color: #1a1d24;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      border-left: 6px solid #ff4d4d;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2d313a;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }

    .title { font-weight: bold; font-size: 16px; color: #ff4d4d;}
    .price { color: #aaaaaa; font-size: 14px;}
    
    .card-body {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stock-name { margin: 0; font-size: 14px; color: #888888; }
    .stock-price { margin: 5px 0 0 0; font-size: 20px; font-weight: bold; }

    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      background-color: #331a1a;
      color: #ff4d4d;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h1>📊 台股交易策略儀表板</h1>
    <button id="scan-btn" class="scan-btn">▶ 開始掃描今日強勢股</button>
    
    <div id="dashboard" class="dashboard">
      <div class="loading-text">👆 請點擊上方按鈕開始連線<br>(資料來源: 台灣證券交易所)</div>
    </div>
  </div>

  <script>
    const targetUrl = "https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL";
    const proxy1 = "https://corsproxy.io/?" + encodeURIComponent(targetUrl);
    const proxy2 = "https://api.allorigins.win/raw?url=" + encodeURIComponent(targetUrl);
    
    const scanBtn = document.getElementById('scan-btn');
    const dashboard = document.getElementById('dashboard');

    function renderCards(data) {
      dashboard.innerHTML = ''; 
      let count = 0;

      data.forEach(stock => {
        if(stock.HighestPrice && stock.ClosingPrice && stock.OpeningPrice) {
          const high = parseFloat(stock.HighestPrice.replace(/,/g, ''));
          const close = parseFloat(stock.ClosingPrice.replace(/,/g, ''));
          const open = parseFloat(stock.OpeningPrice.replace(/,/g, ''));

          if(close === high && close > open) {
            count++;
            if(count <= 15) { 
              const cardHTML = `
                <div class="card">
                  <div class="card-header">
                    <span class="title">🚀 強勢創高</span>
                    <span class="price">代號: ${stock.Code}</span>
                  </div>
                  <div class="card-body">
                    <div>
                      <p class="stock-name">${stock.Name}</p>
                      <p class="stock-price">$${close}</p>
                    </div>
                    <span class="badge">收最高點</span>
                  </div>
                </div>
              `;
              dashboard.innerHTML += cardHTML;
            }
          }
        }
      });

      if(count === 0) {
         dashboard.innerHTML = '<div class="loading-text">今日盤勢無符合條件的股票</div>';
      }
      resetButton();
    }

    function resetButton() {
      scanBtn.innerText = "▶ 重新掃描";
      scanBtn.disabled = false;
    }

    function startScanning() {
      scanBtn.innerText = "⏳ 掃描中，請稍候...";
      scanBtn.disabled = true;
      dashboard.innerHTML = '<div class="loading-text">⏳ 正在連線中，請稍候...</div>';

      fetch(proxy1)
        .then(response => {
            if (!response.ok) throw new Error('Proxy1 Error');
            return response.json();
        })
        .then(data => renderCards(data))
        .catch(error => {
          dashboard.innerHTML = '<div class="loading-text" style="color:#e6b800;">⏳ 網路擁塞，切換備用線路...</div>';
          fetch(proxy2)
            .then(response => {
                if (!response.ok) throw new Error('Proxy2 Error');
                return response.json();
            })
            .then(data => renderCards(data))
            .catch(err => {
              dashboard.innerHTML = `<div class="loading-text" style="color:#ff4d4d;">❌ 網路大塞車，請稍後再試！</div>`;
              resetButton(); 
            });
        });
    }

    scanBtn.addEventListener('click', startScanning);
  </script>
</body>
</html>
